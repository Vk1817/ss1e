<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Star Sports 1 HD </title>
<meta name="referrer" content="no-referrer">

<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-FMP9REY96D"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-FMP9REY96D');
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden}

.shaka-video-container{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#000;
}

video{
width:100%;
height:100%;
object-fit:contain;
}
</style>
</head>

<body>

<div class="shaka-video-container" id="player-container">
<video id="video" autoplay muted playsinline preload="metadata"></video>
</div>

<script>
(function(){

  const CONFIG={
    streamUrl:"https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_BTS/output/index.mpd",
    keyId:"965dc2ddb1d85138ad787999a7f30ca5",
    key:"859695076e67fe961836b564db6d689c",
    cookieUrl:"https://allrounder-live4.pages.dev/api/cookie.json"
  };

  document.addEventListener("DOMContentLoaded",async()=>{

    shaka.polyfill.installAll();
    if(!shaka.Player.isBrowserSupported()) return;

    const video=document.getElementById("video");
    const container=document.getElementById("player-container");

    video.muted=true;

    const player=new shaka.Player();
    await player.attach(video);

    const ui=new shaka.ui.Overlay(player,container,video);

    ui.configure({
      addBigPlayButton:true,
      controlPanelElements:[
        "mute","play_pause","time_and_duration","spacer","quality","fullscreen"
      ]
    });

    player.configure({
      drm:{clearKeys:{[CONFIG.keyId]:CONFIG.key}},
      streaming:{lowLatencyMode:true}
    });

    try{
      const res=await fetch(CONFIG.cookieUrl);
      const data=await res.json();

      player.getNetworkingEngine().registerRequestFilter((type,request)=>{
        request.headers["Cookie"]=data.cookie || "";
      });
    }catch(e){}

    try{
      await player.load(CONFIG.streamUrl);
      video.play().catch(()=>{});
    }catch(e){}

    video.addEventListener("play",()=>{video.muted=false;});

  });

})();
</script>

</body>
</html>
